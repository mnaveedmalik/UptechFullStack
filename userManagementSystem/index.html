<!DOCTYPE html>
<html>

<head>

    <title>User Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* FORM CARD */

        .form-card {
            border: 2px solid #3b82f6;
            border-radius: 16px;
            padding: 30px;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }

        /* animated border light */

        .form-card::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(59, 130, 246, 0.5),
                    transparent);
            transform: rotate(25deg);
            animation: borderMove 4s linear infinite;
        }

        @keyframes borderMove {

            0% {
                transform: translateX(-100%) rotate(25deg)
            }

            100% {
                transform: translateX(100%) rotate(25deg)
            }

        }

        /* keep content above animation */

        .form-card * {
            position: relative;
            z-index: 2;
        }


        /* INPUT STYLE */

        .input-style {
            border: 2px solid #d1d5db;
            border-radius: 10px;
            padding: 10px;
            transition: 0.3s;
        }

        .input-style:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 8px #3b82f6;
            outline: none;
        }


        /* BUTTON STYLE */

        .btn {
            padding: 10px 22px;
            border-radius: 10px;
            font-weight: 600;
            transition: 0.3s;
            cursor: pointer;
        }

        .btn-add {
            background: #22c55e;
            color: white;
        }

        .btn-add:hover {
            background: #16a34a;
            transform: scale(1.05);
        }

        .btn-add:active {
            background: #15803d;
            transform: scale(0.95);
        }
    </style>

</head>


<body class="bg-gray-100 min-h-screen flex items-center justify-center">


    <div class="w-full max-w-5xl p-6">


        <h1 class="text-4xl font-bold text-black text-center mb-10">

            User Management Dashboard

        </h1>



        <!-- FORM -->

        <div class="form-card bg-white mb-10">


            <form id="form" class="grid grid-cols-2 gap-5">


                <input id="firstName" required placeholder="First Name" class="input-style">


                <input id="lastName" required placeholder="Last Name" class="input-style">


                <input type="email" id="email" required placeholder="Email" class="input-style">


                <input type="tel" id="phone" required placeholder="Phone" class="input-style">


                <div class="col-span-2 text-center">

                    <button class="btn btn-add">

                        Add User

                    </button>

                </div>

            </form>

        </div>



        <!-- USER DETAILS TITLE -->

        <h2 class="text-2xl font-bold text-center mb-4 text-gray-800">

            User Details

        </h2>



        <!-- TABLE -->

        <div class="bg-white rounded-xl shadow overflow-hidden">

            <table class="w-full text-center">

                <thead class="bg-indigo-600 text-white">

                    <tr>

                        <th class="p-3">ID</th>
                        <th class="p-3">First Name</th>
                        <th class="p-3">Last Name</th>
                        <th class="p-3">Email</th>
                        <th class="p-3">Phone</th>
                        <th class="p-3">Actions</th>

                    </tr>

                </thead>


                <tbody id="table">

                </tbody>


            </table>

        </div>



        <!-- PAGINATION -->

        <div class="flex justify-between mt-6">


            <button id="prev" class="btn bg-gray-400 text-white hover:bg-gray-600">

                Previous

            </button>


            <button id="next" class="btn bg-green-500 text-white hover:bg-green-700">

                Next

            </button>


        </div>


        <p id="pageMsg" class="text-center mt-3 text-red-500"></p>


    </div>



    <!-- EDIT MODAL -->

    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center">


        <div class="bg-white p-6 rounded-xl w-96">


            <h2 class="text-xl font-bold mb-4">

                Edit User

            </h2>


            <input id="editFirst" class="input-style w-full mb-3">

            <input id="editLast" class="input-style w-full mb-3">

            <input id="editEmail" class="input-style w-full mb-3">

            <input id="editPhone" class="input-style w-full mb-4">


            <div class="flex justify-end gap-3">


                <button id="updateBtn" class="btn bg-yellow-500 text-white hover:bg-yellow-600">

                    Update

                </button>


                <button onclick="closeModal()" class="btn bg-red-500 text-white hover:bg-red-600">

                    Cancel

                </button>


            </div>


        </div>


    </div>


    <script src="userManagementApp.js"></script>


</body>

</html>
